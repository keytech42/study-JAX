site_name: 26-05-19-jax Documentation
site_url: ""
theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - navigation.tabs

plugins:
  - search
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
  - mkdocs-jupyter:
      execute: true
      include_source: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/custom.css
  - https://unpkg.com/tippy.js@6/dist/tippy.css
  - https://unpkg.com/tippy.js@6/animations/shift-away.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/@popperjs/core@2
  - https://unpkg.com/tippy.js@6
  - javascripts/notebook_annotations.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
